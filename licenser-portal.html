    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      .lic-timer-pill {
        display: flex;
        align-items: center;
        gap: 7px;
        background: var(--ink-mid);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 5px 14px;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.06em;
        user-select: none;
        transition: border-color 0.3s;
      }
      .lic-timer-pill.warning {
        border-color: rgba(214, 140, 60, 0.5);
      }
      .lic-timer-pill.danger {
        border-color: rgba(196, 100, 122, 0.6);
      }
      .lic-timer-dot {
        width: 6px;
        height: 6px;
        background: #4caf76;
        border-radius: 50%;
        flex-shrink: 0;
        animation: licPulse 2s ease infinite;
      }
      .lic-timer-dot.warning {
        background: #d6965a;
      }
      .lic-timer-dot.danger {
        background: var(--rose);
      }
      @keyframes licPulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      #licTimerDisplay {
        color: var(--cream);
        font-weight: 500;
      }

      .lic-info-bar {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 64px 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 14px;
      }
      .lic-id-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(201, 168, 76, 0.06);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 5px 16px;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.1em;
        color: var(--gold);
      }

      .lic-notice-wrap {
        max-width: 1200px;
        margin: 0 auto 36px;
        padding: 0 64px;
      }
      .lic-notice {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(201, 168, 76, 0.05);
        border: 1px solid var(--border);
        border-radius: var(--r);
        padding: 11px 18px;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.55;
      }

      .lic-grid-wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 64px 80px;
      }
      .lic-grid-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 28px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
        gap: 12px;
      }

      /* Volume card — reuses .title-card shape */
      .lic-vol-card {
        background: var(--ink-card);
        border: 1px solid var(--border-s);
        border-radius: var(--r-lg);
        overflow: hidden;
        cursor: pointer;
        transition: all 0.32s ease;
        display: flex;
        flex-direction: column;
        animation: fadeUp 0.5s ease both;
        position: relative;
      }
      .lic-vol-card:hover {
        transform: translateY(-6px);
        border-color: var(--border);
        box-shadow: var(--shadow), var(--shadow-g);
      }
      .lic-vol-card::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 2px;
        background: linear-gradient(to bottom, var(--gold), var(--rose));
        opacity: 0;
        transition: opacity 0.25s;
      }
      .lic-vol-card:hover::before {
        opacity: 1;
      }

      .lic-cover-wrap {
        aspect-ratio: 2/3;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .lic-cover-wrap img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: top center;
      }
      .lic-cover-fallback {
        font-family: var(--font-d);
        font-size: 13px;
        color: rgba(255, 255, 255, 0.28);
        text-align: center;
        padding: 20px;
        line-height: 1.4;
        z-index: 1;
      }
      .lic-cover-overlay {
        position: absolute;
        inset: 0;
        background: rgba(8, 5, 8, 0);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.3s;
        z-index: 2;
      }
      .lic-vol-card:hover .lic-cover-overlay {
        background: rgba(8, 5, 8, 0.74);
      }
      .lic-cover-cta {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--gold);
        opacity: 0;
        transform: translateY(6px);
        transition:
          opacity 0.25s,
          transform 0.25s;
      }
      .lic-vol-card:hover .lic-cover-cta {
        opacity: 1;
        transform: translateY(0);
      }

      .lic-vol-badge {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 3;
        background: rgba(8, 5, 8, 0.82);
        border: 1px solid var(--border);
        border-radius: var(--r);
        padding: 3px 10px;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--gold);
      }

      .lic-vol-body {
        padding: 14px 16px 16px;
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .lic-vol-series {
        font-size: 9px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--rose);
        margin-bottom: 5px;
      }
      .lic-vol-title {
        font-family: var(--font-s);
        font-size: 14px;
        color: var(--cream);
        line-height: 1.35;
        margin-bottom: 8px;
        flex: 1;
      }
      .lic-vol-foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-top: 11px;
        border-top: 1px solid var(--border-s);
        gap: 8px;
      }
      .lic-vol-pages {
        font-size: 10px;
        color: var(--muted);
        letter-spacing: 0.1em;
      }

      @media (max-width: 1024px) {
        .lic-info-bar,
        .lic-notice-wrap,
        .lic-grid-wrap {
          padding-left: 32px;
          padding-right: 32px;
        }
      }
      @media (max-width: 768px) {
        .lic-info-bar,
        .lic-notice-wrap,
        .lic-grid-wrap {
          padding-left: 16px;
          padding-right: 16px;
        }
        .lic-timer-pill {
          display: none;
        }
      }
    </style>

    <script src="script.js"></script>
    <script>
      // ── Session timeout: 30 minutes (change here) ──
      const LIC_TIMEOUT_MIN = 30;

      // ── Guard: redirect if not logged in ──
      if (!licGuard()) {
        /* licGuard redirects */
      }

      // ── Populate UI ──
      if (CH_LICENSER) {
        document.getElementById("licNavName").textContent = CH_LICENSER.name;
        document.getElementById("licIdDisplay").textContent = CH_LICENSER.id;
        document.getElementById("licNameDisplay").textContent =
          CH_LICENSER.name;
      }

      // ── Theme ──
      (function () {
        if (localStorage.getItem("ch-theme") === "light")
          document.body.classList.add("light-mode");
      })();
      function toggleTheme() {
        const l = document.body.classList.toggle("light-mode");
        localStorage.setItem("ch-theme", l ? "light" : "dark");
      }

      // ── Session timer ──
      let licTimeLeft = LIC_TIMEOUT_MIN * 60;
      let licCountdown = null;

      function licUpdateTimer() {
        const m = Math.floor(licTimeLeft / 60),
          s = licTimeLeft % 60;
        document.getElementById("licTimerDisplay").textContent =
          String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
        const pill = document.getElementById("licTimerPill"),
          dot = document.getElementById("licTimerDot");
        pill.className = "lic-timer-pill";
        dot.className = "lic-timer-dot";
        if (licTimeLeft <= 60) {
          pill.classList.add("danger");
          dot.classList.add("danger");
        } else if (licTimeLeft <= 300) {
          pill.classList.add("warning");
          dot.classList.add("warning");
        }
      }
      function licResetTimer() {
        licTimeLeft = LIC_TIMEOUT_MIN * 60;
        licUpdateTimer();
      }
      licUpdateTimer();
      licCountdown = setInterval(() => {
        licTimeLeft--;
        licUpdateTimer();
        if (licTimeLeft <= 0) {
          clearInterval(licCountdown);
          document.getElementById("licTimeoutModal").classList.add("open");
        }
      }, 1000);
      ["mousemove", "keydown", "click", "scroll", "touchstart"].forEach((ev) =>
        document.addEventListener(ev, licResetTimer, { passive: true }),
      );

      // ── Render grid ──
      function renderLicVolumes() {
        const grid = document.getElementById("licVolGrid");
        const cnt = document.getElementById("licVolCount");
        cnt.textContent = LIC_VOLUMES.length + " volumes";

        grid.innerHTML = LIC_VOLUMES.map(
          (vol, i) => `
          <div class="lic-vol-card" style="animation-delay:${i * 0.055}s"
               onclick="licOpenVolume('${vol.id}','${vol.title.replace(/'/g, "\\'")}','${vol.cover}')">
            <div class="lic-cover-wrap">
              <img src="${vol.cover}" alt="${vol.title}" loading="lazy" onerror="this.style.display='none'">
              <div class="lic-cover-overlay"><span class="lic-cover-cta">▶ Review →</span></div>
              <div class="lic-vol-badge">${vol.series}</div>
            </div>
            <div class="lic-vol-body">
              <div class="lic-vol-series">${vol.series} · ${vol.num}</div>
              <div class="lic-vol-title">${vol.title}</div>
              <div class="lic-vol-foot">
                <span class="lic-vol-pages">${vol.pages}</span>
                <button class="btn-rose" style="font-size:9px;padding:7px 13px;letter-spacing:0.14em;"
                  onclick="event.stopPropagation();licOpenVolume('${vol.id}','${vol.title.replace(/'/g, "\\'")}','${vol.cover}')">
                  Review →
                </button>
              </div>
            </div>
          </div>
        `,
        ).join("");
      }

      function licOpenVolume(id, title, cover) {
        sessionStorage.setItem("lic_vol", JSON.stringify({ id, title, cover }));
        window.location.href =
          "licenser-reader.html?vol=" + encodeURIComponent(id);
      }

      renderLicVolumes();
